<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            max-height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafbfc;
            color: #172b4d;
        }

        .header {
            background: linear-gradient(135deg, #0052cc, #0065ff);
            color: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
        }

        .header .count {
            font-size: 11px;
            opacity: 0.8;
        }

        .search-bar {
            padding: 10px 12px;
            border-bottom: 1px solid #dfe1e6;
            background: #fff;
        }

        .search-bar input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: #0052cc;
        }

        .notes-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .note-item {
            padding: 10px 14px;
            border-bottom: 1px solid #f0f1f3;
            cursor: pointer;
            transition: background 0.15s;
        }

        .note-item:hover {
            background: #ebecf0;
        }

        .note-key {
            font-size: 12px;
            font-weight: 600;
            color: #0052cc;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 3px;
        }

        .note-key:hover {
            text-decoration: underline;
        }

        .note-text {
            font-size: 11px;
            color: #5e6c84;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 60px;
            overflow: hidden;
        }

        .note-actions {
            margin-top: 6px;
            display: flex;
            gap: 8px;
        }

        .note-actions button {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid #dfe1e6;
            background: #f4f5f7;
            cursor: pointer;
            transition: all 0.15s;
        }

        .note-actions button:hover {
            background: #ebecf0;
        }

        .note-actions .delete-btn:hover {
            background: #ffebe6;
            border-color: #ff5630;
            color: #bf2600;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #97a0af;
            font-size: 13px;
        }

        .empty-state .emoji {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .about-footer {
            padding: 8px 14px;
            border-top: 1px solid #dfe1e6;
            background: #f4f5f7;
            text-align: center;
            font-size: 10px;
            color: #97a0af;
        }

        .about-footer strong {
            color: #5e6c84;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>📝 My Notes</h1>
        <span class="count" id="notes-count"></span>
    </div>
    <div class="search-bar">
        <input type="text" id="search" placeholder="Search by ticket or content...">
    </div>
    <div class="notes-list" id="notes-list"></div>
    <div class="about-footer">
        <strong>PMsToolKit</strong> — Created by EricConcha
    </div>
    <script src="popup.js"></script>
</body>

</html>
